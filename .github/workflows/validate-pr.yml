name: Validate Chain Data

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'data/*/chain.json'
      - 'data/*/README.md'
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Validate JSON syntax
        run: |
          echo "Validating JSON files..."
          find data -name "chain.json" -not -path "*/node_modules/*" -not -path "data/_TEMPLATE/*" | while read file; do
            echo "Checking $file"
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done
          echo "✅ All JSON files are valid"

      - name: Validate required fields
        run: |
          echo "Validating required fields..."
          python3 << 'EOF'
          import json
          import os
          from pathlib import Path

          errors = []
          required_fields = ['subnetId', 'network', 'categories', 'name', 'description', 'logo', 'website', 'socials', 'chains']
          required_chain_fields = ['blockchainId', 'name', 'evmChainId', 'vmName', 'vmId', 'rpcUrls', 'nativeToken']

          for chain_json in Path('data').rglob('chain.json'):
              if '_TEMPLATE' in str(chain_json) or 'node_modules' in str(chain_json):
                  continue

              try:
                  with open(chain_json) as f:
                      data = json.load(f)

                  folder = chain_json.parent.name

                  # Check required fields
                  for field in required_fields:
                      if field not in data:
                          errors.append(f"{folder}: Missing required field '{field}'")

                  # Check chains structure
                  if 'chains' in data and isinstance(data['chains'], list):
                      for idx, chain in enumerate(data['chains']):
                          for field in required_chain_fields:
                              if field not in chain:
                                  errors.append(f"{folder}: chains[{idx}] missing '{field}'")

                          # Validate nativeToken structure
                          if 'nativeToken' in chain:
                              native = chain['nativeToken']
                              if not isinstance(native, dict):
                                  errors.append(f"{folder}: chains[{idx}] nativeToken must be object")

                  # Validate network value
                  if 'network' in data and data['network'] not in ['mainnet', 'fuji']:
                      errors.append(f"{folder}: network must be 'mainnet' or 'fuji'")

              except Exception as e:
                  errors.append(f"{chain_json}: {str(e)}")

          if errors:
              print("❌ Validation errors found:")
              for error in errors:
                  print(f"  - {error}")
              exit(1)
          else:
              print("✅ All required fields present")
          EOF

      - name: Validate data integrity
        run: |
          echo "Running data integrity checks..."
          python3 << 'EOF'
          import json
          import re
          import os
          import subprocess
          from pathlib import Path

          errors = []
          warnings = []

          TEMPLATE_STRINGS = [
              'subnet-id-here', 'blockchain-id-here', 'chain-slug',
              'vm-id-here', 'rpc-url-here', 'Chain Name', 'My Chain',
              'Describe your', 'https://your-', 'TEMPLATE',
          ]

          URL_PATTERN = re.compile(r'^https?://[^\s/$.?#].[^\s]*$')

          def has_template_value(obj, path=''):
              if isinstance(obj, str):
                  for t in TEMPLATE_STRINGS:
                      if t.lower() in obj.lower():
                          return f"template placeholder at '{path}': {obj!r}"
              elif isinstance(obj, dict):
                  for k, v in obj.items():
                      r = has_template_value(v, f"{path}.{k}")
                      if r: return r
              elif isinstance(obj, list):
                  for i, v in enumerate(obj):
                      r = has_template_value(v, f"{path}[{i}]")
                      if r: return r
              return None

          all_chains = []
          for chain_json in Path('data').rglob('chain.json'):
              if '_TEMPLATE' in str(chain_json) or 'node_modules' in str(chain_json):
                  continue
              try:
                  with open(chain_json) as f:
                      data = json.load(f)
                  all_chains.append((str(chain_json), chain_json.parent.name, data))
              except Exception as e:
                  errors.append(f"{chain_json}: failed to parse - {e}")

          changed_folders = set()
          is_pr = os.environ.get('GITHUB_EVENT_NAME') == 'pull_request'
          if is_pr:
              try:
                  base_ref = os.environ.get('GITHUB_BASE_REF', 'main')
                  result = subprocess.run(
                      ['git', 'diff', '--name-only', f'origin/{base_ref}...HEAD'],
                      capture_output=True, text=True
                  )
                  for line in result.stdout.strip().splitlines():
                      if line.startswith('data/') and 'chain.json' in line:
                          parts = line.split('/')
                          if len(parts) >= 2:
                              changed_folders.add(parts[1])
              except Exception as e:
                  print(f"Warning: could not detect changed files - {e}")

          # CHECK 1: Category casing (all files, BLOCKING)
          for _, folder, data in all_chains:
              for cat in data.get('categories', []):
                  if isinstance(cat, str) and cat != cat.upper():
                      errors.append(f"{folder}: category '{cat}' must be uppercase - use '{cat.upper()}'")

          # CHECK 2: Template value rejection (all files, BLOCKING)
          for _, folder, data in all_chains:
              result = has_template_value(data, folder)
              if result:
                  errors.append(f"{folder}: {result}")

          # CHECK 3: URL format validation (non-empty values only, BLOCKING)
          for _, folder, data in all_chains:
              for field in ['logo', 'website']:
                  url = data.get(field, '')
                  if url and not URL_PATTERN.match(url):
                      errors.append(f"{folder}: '{field}' is not a valid URL: {url!r}")
              for social in data.get('socials', []):
                  url = social.get('url', '')
                  if url and not URL_PATTERN.match(url):
                      errors.append(f"{folder}: social url is not a valid URL: {url!r}")
              for chain in data.get('chains', []):
                  for rpc in chain.get('rpcUrls', []):
                      if rpc and not URL_PATTERN.match(rpc):
                          errors.append(f"{folder}: rpcUrl is not a valid URL: {rpc!r}")
                  nt = chain.get('nativeToken', {})
                  logo_uri = nt.get('logoUri', '') if isinstance(nt, dict) else ''
                  if logo_uri and not URL_PATTERN.match(logo_uri):
                      errors.append(f"{folder}: nativeToken.logoUri is not a valid URL: {logo_uri!r}")

          # CHECK 4: nativeToken completeness (changed PR files = BLOCK, all files logoUri = WARN)
          for _, folder, data in all_chains:
              for idx, chain in enumerate(data.get('chains', [])):
                  nt = chain.get('nativeToken', {})
                  if not isinstance(nt, dict):
                      continue
                  if is_pr and folder in changed_folders:
                      for field in ['symbol', 'name', 'decimals']:
                          val = nt.get(field)
                          if val is None or val == '':
                              errors.append(f"{folder}: chains[{idx}].nativeToken.{field} required and cannot be empty")
                      evm_id = chain.get('evmChainId')
                      if evm_id is None:
                          errors.append(f"{folder}: chains[{idx}].evmChainId cannot be null - assign a chain ID before merging")
                  logo_uri = nt.get('logoUri', '')
                  if logo_uri == '' or logo_uri is None:
                      warnings.append(f"{folder}: chains[{idx}].nativeToken.logoUri is empty (warning only)")

          # CHECK 5: Unique subnetId (skip empty strings, BLOCKING)
          seen_subnet_ids = {}
          for _, folder, data in all_chains:
              sid = data.get('subnetId', '')
              if sid:
                  if sid in seen_subnet_ids:
                      errors.append(f"{folder}: duplicate subnetId '{sid}' already used by '{seen_subnet_ids[sid]}'")
                  else:
                      seen_subnet_ids[sid] = folder

          # CHECK 6: Unique evmChainId (skip null, BLOCKING)
          seen_evm_ids = {}
          for _, folder, data in all_chains:
              for idx, chain in enumerate(data.get('chains', [])):
                  eid = chain.get('evmChainId')
                  if eid is not None:
                      key = str(eid)
                      if key in seen_evm_ids:
                          errors.append(f"{folder}: chains[{idx}].evmChainId {eid} already used by '{seen_evm_ids[key]}'")
                      else:
                          seen_evm_ids[key] = folder

          if warnings:
              print("Warnings (non-blocking):")
              for w in warnings[:20]:
                  print(f"  - {w}")
              if len(warnings) > 20:
                  print(f"  ... and {len(warnings) - 20} more")

          if errors:
              print("\nData integrity errors (blocking):")
              for e in errors:
                  print(f"  ERROR: {e}")
              exit(1)
          else:
              print("Data integrity checks passed")
          EOF

      - name: Check folder naming convention
        run: |
          echo "Checking folder naming conventions..."
          python3 << 'EOF'
          import re
          from pathlib import Path

          errors = []
          pattern = re.compile(r'^[a-z0-9-]+$')

          data_dir = Path('data')
          if data_dir.exists():
              for item in data_dir.iterdir():
                  if item.is_dir() and not item.name.startswith('.') and not item.name.startswith('_') and item.name != 'node_modules':
                      if not pattern.match(item.name):
                          errors.append(f"Folder '{item.name}' must be lowercase and hyphenated (e.g., 'my-chain-name')")

          if errors:
              print("❌ Folder naming errors:")
              for error in errors:
                  print(f"  - {error}")
              exit(1)
          else:
              print("✅ All folder names follow convention")
          EOF

      - name: Check file structure
        run: |
          echo "Checking required files in each chain folder..."
          python3 << 'EOF'
          from pathlib import Path

          errors = []
          data_dir = Path('data')

          if data_dir.exists():
              for item in data_dir.iterdir():
                  if item.is_dir() and not item.name.startswith('.') and not item.name.startswith('_') and item.name != 'node_modules':
                      chain_json = item / 'chain.json'
                      readme = item / 'README.md'

                      if not chain_json.exists():
                          errors.append(f"{item.name}: Missing chain.json file")

                      if not readme.exists():
                          errors.append(f"{item.name}: Missing README.md file")
                      elif readme.stat().st_size == 0:
                          errors.append(f"{item.name}: README.md is empty")

          if errors:
              print("File structure errors:")
              for error in errors:
                  print(f"  - {error}")
              exit(1)
          else:
              print("All chain folders have required files (chain.json + README.md)")
          EOF

      - name: Validate URLs
        run: |
          echo "Validating URLs..."
          python3 << 'EOF'
          import json
          import urllib.request
          import urllib.error
          from pathlib import Path
          import time

          errors = []
          warnings = []

          def check_url(url, timeout=10):
              """Check if URL is reachable"""
              if not url or url.strip() == '':
                  return False, "Empty URL"

              try:
                  # Add user agent to avoid 403 errors
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=timeout) as response:
                      return response.status == 200, f"Status: {response.status}"
              except urllib.error.HTTPError as e:
                  return False, f"HTTP {e.code}"
              except urllib.error.URLError as e:
                  return False, f"URL Error: {e.reason}"
              except Exception as e:
                  return False, f"Error: {str(e)}"

          for chain_json in Path('data').rglob('chain.json'):
              if '_TEMPLATE' in str(chain_json):
                  continue

              try:
                  with open(chain_json) as f:
                      data = json.load(f)

                  folder = chain_json.parent.name

                  # Check website URL
                  if data.get('website'):
                      is_valid, msg = check_url(data['website'])
                      if not is_valid:
                          warnings.append(f"{folder}: Website URL unreachable - {data['website']} ({msg})")

                  # Check logo URL
                  if data.get('logo'):
                      is_valid, msg = check_url(data['logo'])
                      if not is_valid:
                          warnings.append(f"{folder}: Logo URL unreachable - {data['logo']} ({msg})")

                  # Check social URLs
                  for social in data.get('socials', []):
                      if social.get('url'):
                          is_valid, msg = check_url(social['url'])
                          if not is_valid:
                              warnings.append(f"{folder}: Social URL unreachable ({social.get('name')}) - {social['url']} ({msg})")

                  # Small delay to avoid rate limiting
                  time.sleep(0.5)

              except Exception as e:
                  errors.append(f"{folder}: Error checking URLs - {str(e)}")

          # Save warnings for the report step
          with open('url-warnings.json', 'w') as f:
              json.dump(warnings, f)

          if errors:
              print("Errors during URL validation:")
              for error in errors:
                  print(f"  - {error}")
              exit(1)

          if warnings:
              print("URL validation warnings (not blocking):")
              for warning in warnings:
                  print(f"  - {warning}")
          else:
              print("All URLs are reachable")
          EOF

      - name: Validate RPC endpoints
        run: |
          echo "Validating RPC endpoints..."
          python3 << 'EOF'
          import json
          import urllib.request
          import urllib.error
          from pathlib import Path
          import time

          warnings = []

          def check_rpc(rpc_url, timeout=10):
              """Check if RPC endpoint is responding"""
              if not rpc_url or rpc_url.strip() == '':
                  return False, "Empty RPC URL"

              try:
                  # Basic JSON-RPC health check
                  data = json.dumps({
                      "jsonrpc": "2.0",
                      "method": "eth_blockNumber",
                      "params": [],
                      "id": 1
                  }).encode('utf-8')

                  req = urllib.request.Request(
                      rpc_url,
                      data=data,
                      headers={
                          'Content-Type': 'application/json',
                          'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'
                      }
                  )

                  with urllib.request.urlopen(req, timeout=timeout) as response:
                      result = json.loads(response.read().decode('utf-8'))
                      if 'result' in result or 'error' in result:
                          return True, "RPC responding"
                      return False, "Invalid response"
              except Exception as e:
                  return False, str(e)

          for chain_json in Path('data').rglob('chain.json'):
              if '_TEMPLATE' in str(chain_json):
                  continue

              try:
                  with open(chain_json) as f:
                      data = json.load(f)

                  folder = chain_json.parent.name

                  # Check RPC URLs in chains
                  for chain in data.get('chains', []):
                      for rpc_url in chain.get('rpcUrls', []):
                          if rpc_url:
                              is_valid, msg = check_rpc(rpc_url)
                              if not is_valid:
                                  warnings.append(f"{folder}/{chain.get('name', 'unknown')}: RPC unreachable - {rpc_url} ({msg})")

                          # Delay between RPC checks
                          time.sleep(1)

              except Exception as e:
                  warnings.append(f"{folder}: Error checking RPCs - {str(e)}")

          if warnings:
              print("RPC validation warnings (not blocking):")
              for warning in warnings:
                  print(f"  - {warning}")
          else:
              print("All RPC endpoints are responding")

          # Save warnings for the report step
          with open('rpc-warnings.json', 'w') as f:
              json.dump(warnings, f)
          EOF

      - name: Check content quality
        run: |
          echo "Checking content quality..."
          python3 << 'EOF'
          import json
          from pathlib import Path

          warnings = []

          for chain_json in Path('data').rglob('chain.json'):
              if '_TEMPLATE' in str(chain_json):
                  continue

              try:
                  with open(chain_json) as f:
                      data = json.load(f)

                  folder = chain_json.parent.name

                  # Check description length
                  desc = data.get('description', '').strip()
                  if len(desc) < 20:
                      warnings.append(f"{folder}: Description too short (< 20 chars)")
                  elif len(desc) > 500:
                      warnings.append(f"{folder}: Description very long (> 500 chars)")

                  # Check if subnet ID looks valid (basic format check)
                  subnet_id = data.get('subnetId', '')
                  if subnet_id and len(subnet_id) < 20:
                      warnings.append(f"{folder}: SubnetId seems too short - might be invalid")

                  # Check if chains array is empty
                  if not data.get('chains') or len(data.get('chains', [])) == 0:
                      warnings.append(f"{folder}: No blockchains defined in chains array")

                  # Check if categories is empty
                  if not data.get('categories') or len(data.get('categories', [])) == 0:
                      warnings.append(f"{folder}: No categories defined")

              except Exception as e:
                  warnings.append(f"{folder}: Error checking content - {str(e)}")

          if warnings:
              print("Content quality warnings (not blocking):")
              for warning in warnings[:20]:  # Limit to first 20
                  print(f"  - {warning}")
              if len(warnings) > 20:
                  print(f"  ... and {len(warnings) - 20} more warnings")
          else:
              print("Content quality checks passed")

          # Save warnings for the report step
          with open('quality-warnings.json', 'w') as f:
              json.dump(warnings, f)
          EOF

      - name: Get changed files
        if: github.event_name == 'pull_request'
        id: changed-files
        run: |
          # Get list of changed chain.json files
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'data/.*/chain.json' || echo "")
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -z "$CHANGED_FILES" ]; then
            echo "No chain.json files changed in this PR"
          else
            echo "Changed files:"
            echo "$CHANGED_FILES"
          fi

      - name: Generate validation report
        if: always()
        run: |
          echo "Generating validation summary report..."
          python3 << 'EOF'
          import json
          import os
          from pathlib import Path

          def load_warnings(filename):
              try:
                  with open(filename) as f:
                      return json.load(f)
              except (FileNotFoundError, json.JSONDecodeError):
                  return []

          # Load warnings saved by earlier validation steps
          url_warnings = load_warnings('url-warnings.json')
          rpc_warnings = load_warnings('rpc-warnings.json')
          quality_warnings = load_warnings('quality-warnings.json')

          # Count total chains
          chain_count = sum(
              1 for p in Path('data').iterdir()
              if p.is_dir() and not p.name.startswith('.') and not p.name.startswith('_')
              and (p / 'chain.json').exists()
          )

          is_pr = os.environ.get('GITHUB_EVENT_NAME') == 'pull_request'
          scope = "in registry" if not is_pr else "in this PR"

          report = "## Validation Report\n\n"
          report += "Status: All required validations passed\n\n"
          report += "### Summary\n"
          report += f"- Total chains in registry: {chain_count}\n"
          report += f"- URL warnings: {len(url_warnings)}\n"
          report += f"- RPC warnings: {len(rpc_warnings)}\n"
          report += f"- Quality warnings: {len(quality_warnings)}\n\n"

          if url_warnings or rpc_warnings or quality_warnings:
              report += "### Warnings (Non-blocking)\n\n"

              if url_warnings:
                  report += "URL Issues:\n"
                  for w in url_warnings[:5]:
                      report += f"- {w}\n"
                  if len(url_warnings) > 5:
                      report += f"- ... and {len(url_warnings) - 5} more\n"
                  report += "\n"

              if rpc_warnings:
                  report += "RPC Issues:\n"
                  for w in rpc_warnings[:5]:
                      report += f"- {w}\n"
                  if len(rpc_warnings) > 5:
                      report += f"- ... and {len(rpc_warnings) - 5} more\n"
                  report += "\n"

              if quality_warnings:
                  report += "Content Quality:\n"
                  for w in quality_warnings[:5]:
                      report += f"- {w}\n"
                  if len(quality_warnings) > 5:
                      report += f"- ... and {len(quality_warnings) - 5} more\n"

              report += "\nNote: Warnings are informational and do not block this PR.\n"
          else:
              report += "No warnings found.\n"

          # Save to file for PR comment
          with open('validation-report.md', 'w') as f:
              f.write(report)

          print(report)
          EOF

      - name: Comment PR with validation results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read the validation report
            let report = '## Validation Report\n\nValidation checks completed.';
            try {
              report = fs.readFileSync('validation-report.md', 'utf8');
            } catch (error) {
              console.log('No validation report found');
            }

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Validation Report')
            );

            // Create or update comment
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Validation Summary
        if: success()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "All validations passed"
          echo "Check PR comments for detailed validation report"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
