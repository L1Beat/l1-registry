name: Validate Chain Data

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'data/*/chain.json'
      - 'data/*/README.md'
  push:
    branches: [main, master]
    paths:
      - 'data/*/chain.json'
      - 'data/*/README.md'

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Detect changed folders
        id: changes
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep '^data/.*/chain.json$' \
              | sed 's|data/||;s|/chain.json||' \
              | paste -sd, - || true)
            echo "folders=$CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Run structural validation
        run: |
          ARGS="--output-json validation-results.json"
          if [ -n "${{ steps.changes.outputs.folders }}" ]; then
            ARGS="--changed-folders ${{ steps.changes.outputs.folders }} $ARGS"
          fi
          node scripts/validate-all.js $ARGS

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-results
          path: validation-results.json

  check-reachability:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Detect changed folders
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^data/.*/chain.json$' \
            | sed 's|data/||;s|/chain.json||' \
            | paste -sd, - || true)
          echo "folders=$CHANGED" >> $GITHUB_OUTPUT

      - name: Check URL and RPC reachability
        if: steps.changes.outputs.folders != ''
        run: node scripts/check-reachability.js --folders "${{ steps.changes.outputs.folders }}" --output-json reachability-results.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reachability-results
          path: reachability-results.json
          if-no-files-found: ignore

  report:
    runs-on: ubuntu-latest
    needs: [validate-structure, check-reachability]
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
        continue-on-error: true

      - name: Generate report
        run: node scripts/generate-report.js validation-results.json reachability-results.json validation-report.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '## Validation Report\n\nValidation checks completed.';
            try {
              report = fs.readFileSync('validation-report.md', 'utf8');
            } catch (e) {
              console.log('No validation report found');
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Validation Report')
            );

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report,
            };

            if (botComment) {
              await github.rest.issues.updateComment({ ...params, comment_id: botComment.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
